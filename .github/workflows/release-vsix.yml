name: Release VSIX

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-vsix-main
  cancel-in-progress: false

jobs:
  release:
    # Prevent loops when this workflow pushes the version bump commit.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump patch version
        id: bump
        run: |
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build VSIX
        run: npm run package:vsix

      - name: Commit release bump
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): v$VERSION [skip ci]"

      - name: Create git tag
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: git tag "v$VERSION"

      - name: Push commit and tag
        run: git push origin HEAD:main --follow-tags

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ steps.bump.outputs.version }}
          path: '*.vsix'
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          files: '*.vsix'
          generate_release_notes: true
